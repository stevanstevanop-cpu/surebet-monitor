name: Sure Bet Monitor

on:
  schedule:
    # GitHub minimum cron je 5 minuta. Stvarno se cesto izvrsi 5-15 min kasno
    # tokom peak sati GitHub-a — to je njihov known issue.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # rucni trigger iz Actions tab-a

permissions:
  contents: write  # za commit seen_bets.json

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run one cycle
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_PROFIT: ${{ vars.MIN_PROFIT || '4' }}
          ONE_SHOT: '1'
          HEADLESS: '1'
          FAST_LOAD: '1'
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_bets.json
          git diff --staged --quiet && echo "no state change" && exit 0
          git commit -m "update state [skip ci]"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: |
            monitor.log
            notifications.log
          if-no-files-found: ignore
          retention-days: 7
