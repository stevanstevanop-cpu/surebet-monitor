name: Sure Bet Monitor

on:
  # Cron je ISKLJUCEN: oddsportal sluzi praznu tabelu na GitHub Actions IP-jevima.
  # Workflow se i dalje moze pokrenuti rucno preko "Run workflow" dugmeta — u sustini
  # samo za testove, ne za pravu produkciju.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false  # ne otkazuj aktivni job — sacekaj da zavrsi

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5h 50min (max je 360 za free tier)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run monitor (~5h 30min, polling 30s)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_PROFIT: ${{ vars.MIN_PROFIT || '4' }}
          POLL_SECONDS: '30'
          HEADLESS: '1'
          # NA GITHUB-U: FAST_LOAD=0. Blokiranje resursa krsi rendering tabele
          # (Vue app ne dobije podatke) na GitHub Actions IP-jevima.
          FAST_LOAD: '0'
          # 5h 30m = 19800s. Ostavlja 20 min buffer pre GitHub-ovog 5h50m timeout-a
          # za commit state-a + cleanup + setup sledeceg job-a.
          MAX_RUNTIME_SECONDS: '19800'
        run: python main.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_bets.json
          if git diff --staged --quiet; then
            echo "no state change"
            exit 0
          fi
          git commit -m "update state [skip ci]"
          # ako su se mejnstrim commit-ovi promenili u medjuvremenu — rebase
          git pull --rebase origin main || git rebase --abort || true
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: |
            monitor.log
            notifications.log
            last_page.html
          if-no-files-found: ignore
          retention-days: 7
